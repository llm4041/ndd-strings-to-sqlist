name: Build NDD Plugin (StringsToSqlList)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python (for aqtinstall)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt 5.15.2 (MSVC 2019 x64)
        shell: pwsh
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 -O C:\Qt
          Get-ChildItem C:\Qt\5.15.2\msvc2019_64\bin -Filter qmake.exe

      - name: Auto-detect vcvars64 & download QScintilla
        shell: pwsh
        run: |
          # 首先尝试使用 vswhere 定位安装路径
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vcvars = $null

          if (Test-Path $vswhere) {
            try {
              $instPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath 2>$null
              if ($instPath) {
                $candidate = Join-Path $instPath 'VC\Auxiliary\Build\vcvars64.bat'
                if (Test-Path $candidate) { $vcvars = $candidate }
              }
            } catch {
              Write-Host "vswhere failed or returned nothing: $_"
            }
          } else {
            Write-Host "vswhere not found at $vswhere"
          }

          # 回退查找：在常见安装目录递归查找 vcvars64.bat
          if (-not $vcvars) {
            $searchRoots = @(
              'C:\Program Files (x86)\Microsoft Visual Studio',
              'C:\Program Files\Microsoft Visual Studio'
            )
            foreach ($root in $searchRoots) {
              if (Test-Path $root) {
                Write-Host "Searching for vcvars64.bat under $root ..."
                $found = Get-ChildItem -Path $root -Recurse -Filter 'vcvars64.bat' -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($found) { $vcvars = $found.FullName; break }
              }
            }
          }

          if (-not $vcvars) {
            Write-Error "vcvars64.bat not found. Ensure Visual Studio with C++ build tools is present on this runner."
            exit 1
          }

          Write-Host "vcvars64.bat found at: $vcvars"
          "VCVARS_PATH=$vcvars" | Add-Content -Path $env:GITHUB_ENV

          # QScintilla 下载与解压
          $url = "https://www.riverbankcomputing.com/static/Downloads/QScintilla/2.14.1/QScintilla_src-2.14.1.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile qscintilla.tar.gz -UseBasicParsing -TimeoutSec 120

          Write-Host "Extracting QScintilla..."
          tar xzf qscintilla.tar.gz
          
          # 验证解压成功
          if (!(Test-Path "QScintilla_src-2.14.1")) {
            Write-Host "==== Debug: top-level listing ===="
            Get-ChildItem -Force | Select-Object -First 200
            Write-Error "QScintilla_src-2.14.1 directory not found after extraction"
            exit 1
          }

          # 导出 QTDIR
          "QTDIR=C:\Qt\5.15.2\msvc2019_64" | Add-Content -Path $env:GITHUB_ENV

          # 自动查找 qscintilla.pro 并导出目录到 GITHUB_ENV
          $qpro = Get-ChildItem -Path "QScintilla_src-2.14.1" -Recurse -Filter qscintilla.pro -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $qpro) {
            Write-Host "==== Debug: QScintilla_src-2.14.1 contents ===="
            Get-ChildItem -Path "QScintilla_src-2.14.1" -Force
            Write-Host "==== Debug: recursive listing ===="
            Get-ChildItem -Path "QScintilla_src-2.14.1" -Recurse -Force | Select-Object -First 200
            Write-Error "qscintilla.pro not found in QScintilla_src-2.14.1"
            exit 1
          }

          $qdir = Split-Path $qpro.FullName -Parent
          Write-Host "Found qscintilla.pro at: $($qpro.FullName)"
          Write-Host "Setting QSCINTILLA_DIR to: $qdir"
          "QSCINTILLA_DIR=$qdir" | Add-Content -Path $env:GITHUB_ENV

          # 列出找到的 .pro 文件供调试
          Write-Host "Found .pro files:"
          Get-ChildItem -Path "QScintilla_src-2.14.1" -Recurse -Filter *.pro | Select-Object -ExpandProperty FullName | Select-Object -First 20

      - name: Build QScintilla
        shell: cmd
        run: |
          call "%VCVARS_PATH%"
          set PATH=%QTDIR%\bin;%PATH%
          set INCLUDE=%QTDIR%\include;%INCLUDE%
          set LIB=%QTDIR%\lib;%LIB%

          echo QTDIR=%QTDIR%
          echo QSCINTILLA_DIR=%QSCINTILLA_DIR%
          echo Current dir: %CD%

          rem 优先在 QSCINTILLA_DIR 下找 qscintilla.pro
          if exist "%QSCINTILLA_DIR%\qscintilla.pro" (
            echo Found at QSCINTILLA_DIR\qscintilla.pro
            cd "%QSCINTILLA_DIR%"
          ) else if exist "%QSCINTILLA_DIR%\Qt4Qt5\qscintilla.pro" (
            echo Found at QSCINTILLA_DIR\Qt4Qt5\qscintilla.pro
            cd "%QSCINTILLA_DIR%\Qt4Qt5"
          ) else if exist "QScintilla_src-2.14.1\src\qscintilla.pro" (
            echo Found at QScintilla_src-2.14.1\src\qscintilla.pro
            cd "QScintilla_src-2.14.1\src"
          ) else (
            echo ==== Debug: current directory contents ====
            dir /b
            echo ==== Debug: searching for qscintilla.pro ====
            dir /s /b qscintilla.pro 2>nul || echo No qscintilla.pro found
            echo qscintilla.pro not found. Failing.
            exit /b 1
          )

          echo Now in %CD%
          echo Running qmake...
          qmake qscintilla.pro
          if errorlevel 1 exit /b 1
          echo Running nmake release...
          nmake release
          if errorlevel 1 exit /b 1
          echo Running nmake install...
          nmake install
          if errorlevel 1 exit /b 1

      - name: Diagnose — where did QScintilla install to?
        shell: pwsh
        run: |
          Write-Host "=== QTDIR/include/Qsci ==="
          if (Test-Path "$env:QTDIR\include\Qsci") { Get-ChildItem "$env:QTDIR\include\Qsci" -Name | Select-Object -First 15 } else { Write-Host "(directory not found)" }
          Write-Host "=== QTDIR/lib (looking for qscintilla lib) ==="
          Get-ChildItem -Recurse -Path $env:QTDIR\lib -Filter "*qscintilla*" -ErrorAction SilentlyContinue
          Write-Host "=== QTDIR/bin (looking for qscintilla dll) ==="
          Get-ChildItem -Recurse -Path $env:QTDIR\bin -Filter "*qscintilla*" -ErrorAction SilentlyContinue
          Write-Host "=== QScintilla build output folders ==="
          Get-ChildItem -Recurse -Path . -Filter "*.lib" -ErrorAction SilentlyContinue | Select-Object -First 10
          Get-ChildItem -Recurse -Path . -Filter "*.dll" -ErrorAction SilentlyContinue | Select-Object -First 10
          Get-ChildItem -Recurse -Path . -Filter "*.h" -ErrorAction SilentlyContinue | Select-Object -First 10 FullName

      - name: Build plugin DLL
        shell: cmd
        run: |
          call "%VCVARS_PATH%"
          set PATH=%QTDIR%\bin;%PATH%
          set INCLUDE=%QTDIR%\include;%INCLUDE%
          set LIB=%QTDIR%\lib;%LIB%

          REM ---- 如果 QScintilla 的头文件没装到 %QTDIR%\include\Qsci，
          REM      下面会自动查找其实际位置并附加到 INCLUDEPATH ----
          if exist "%QTDIR%\include\Qsci\qsciscintilla.h" goto :have_qscintilla

          REM 尝试在源码树里找头文件并复制过来
          for /f "delims=" %%i in ('dir /s /b QScintilla_src-2.14.1\qsciscintilla.h 2^>nul') do set QSCI_H=%%i
          if not "%QSCI_H%"=="" (
            for %%d in ("%QSCI_H%") do set QSCI_DIR=%%~dpd
            echo Auto-found QScintilla headers at: %QSCI_DIR%
            if not exist "%QTDIR%\include\Qsci" mkdir "%QTDIR%\include\Qsci"
            copy /y "%QSCI_DIR%*.h" "%QTDIR%\include\Qsci\"
          )

          REM 同样查找 .lib 并复制到 Qt 树
          for /f "delims=" %%i in ('dir /s /b QScintilla_src-2.14.1\*.lib 2^>nul') do set QSCI_LIB=%%i
          if not "%QSCI_LIB%"=="" (
            echo Auto-found QScintilla lib: %QSCI_LIB%
            copy /y "%QSCI_LIB%" "%QTDIR%\lib\"
          )

          :have_qscintilla
          qmake ndd-strings-to-sqlist.pro
          if errorlevel 1 exit /b 1
          nmake release
          if errorlevel 1 exit /b 1

      - name: Locate built DLL
        shell: pwsh
        run: |
          Write-Host "=== Built DLLs ==="
          $dlls = Get-ChildItem -Recurse -Filter *.dll -Path .
          $dlls | Format-List FullName, Length
          if (-not $dlls) { Write-Error "NO DLL FOUND"; exit 1 }
          $ourDll = $dlls | Where-Object { $_.Name -match "strings|sql" } | Select-Object -First 1
          if (-not $ourDll) { $ourDll = $dlls | Select-Object -Last 1 }
          Write-Host "Selected: $($ourDll.FullName)"
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item $ourDll.FullName artifact\
          Get-ChildItem artifact

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndd-strings-to-sqlist-dll
          path: artifact/*.dll
          retention-days: 30
